<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>理財記帳簿 - Sheets 同步</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #fcfaf7;
            color: #5d5245;
        }
        .milktea-gradient {
            background: linear-gradient(135deg, #dccabd 0%, #b8a390 100%);
        }
        .milktea-gradient-green {
            background: linear-gradient(135deg, #c5d3c1 0%, #a4b69c 100%);
        }
        .jar-card {
            transition: all 0.3s ease;
            border: 1px solid #e5ddd3;
        }
        .jar-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 20px -5px rgba(184, 163, 144, 0.2);
        }
        .input-style {
            background-color: #f3ede6;
            border: 1px solid #e5ddd3;
            border-radius: 12px;
            outline: none;
            transition: all 0.2s;
        }
        .input-style:focus {
            background-color: #fff;
            border-color: #b8a390;
            box-shadow: 0 0 0 3px rgba(184, 163, 144, 0.1);
        }
        .modal-bg {
            background-color: rgba(93, 82, 69, 0.4);
        }
        .tab-active {
            border-bottom: 2px solid #b8a390;
            color: #b8a390;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div class="text-center md:text-left">
                <h1 class="text-2xl font-bold tracking-widest text-stone-700 mb-1">理財記帳簿</h1>
                <p class="text-stone-400 text-sm italic">Google Sheets 雲端連線模式</p>
            </div>
            
            <!-- Google Sheets 設定區 -->
            <div class="flex flex-col gap-2 bg-white p-4 rounded-2xl shadow-sm border border-stone-100 w-full md:w-auto">
                <div class="flex gap-2">
                    <input type="text" id="script-url" placeholder="貼上 Google Script Web App URL" class="text-[10px] p-2 input-style w-full md:w-80">
                    <button onclick="syncWithSheets()" id="sync-btn" class="text-[10px] milktea-gradient text-white px-4 py-2 rounded-xl font-bold hover:brightness-105 transition whitespace-nowrap">同步雲端資料</button>
                </div>
                <p class="text-[9px] text-stone-400">* 請先部署 Google Apps Script 並取得 Web App 網址</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- 左側：設定與看板 -->
            <div class="lg:col-span-8">
                <!-- 帳戶資產總覽 -->
                <div class="bg-white rounded-2xl p-6 mb-6 border border-stone-100 shadow-sm">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-xs font-bold text-stone-400 tracking-widest uppercase">帳戶資產管理</h3>
                        <button onclick="toggleModal('account-modal')" class="text-[10px] bg-stone-100 text-stone-500 px-3 py-1 rounded-full hover:bg-stone-200 transition">+ 新增帳戶</button>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4" id="accounts-container"></div>
                    <div class="mt-4 pt-4 border-t border-stone-50 flex justify-between items-center">
                        <span class="text-xs text-stone-400 uppercase tracking-widest">總資產淨值</span>
                        <span class="text-xl font-black text-stone-700" id="total-assets">$0</span>
                    </div>
                </div>

                <!-- 預算基準與儲蓄設定 -->
                <div class="bg-white rounded-2xl p-6 mb-6 border border-stone-100 shadow-sm">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-xs font-bold text-stone-400 mb-2 tracking-widest uppercase">實拿月薪</label>
                            <input type="number" id="salary" class="w-full p-3 input-style font-bold text-stone-700" onchange="updateSalaryGoal()">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-stone-400 mb-2 tracking-widest uppercase">長期儲蓄 (固定金額)</label>
                            <input type="number" id="savings-goal" class="w-full p-3 input-style font-bold text-stone-700" onchange="updateSalaryGoal()">
                        </div>
                    </div>
                </div>

                <!-- 五罐子分配顯示 -->
                <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3 mb-8" id="jars-container"></div>

                <!-- 大看板 -->
                <div class="milktea-gradient text-white rounded-3xl p-10 shadow-lg text-center">
                    <h2 class="text-sm font-medium opacity-80 mb-3 tracking-widest uppercase">本月剩餘可動用金額 (不含儲蓄)</h2>
                    <div class="text-7xl font-black tracking-tighter" id="monthly-total">$0</div>
                </div>
            </div>

            <!-- 右側：記帳區 -->
            <div class="lg:col-span-4">
                <div class="bg-white rounded-2xl p-6 border border-stone-100 shadow-sm h-full flex flex-col">
                    <div class="flex mb-6 border-b border-stone-100">
                        <button onclick="switchTab('expense')" id="tab-expense" class="flex-1 py-2 text-sm font-bold tab-active">支出</button>
                        <button onclick="switchTab('income')" id="tab-income" class="flex-1 py-2 text-sm font-bold text-stone-400">收入</button>
                    </div>
                    
                    <div id="form-expense" class="space-y-3 mb-6">
                        <input type="text" id="exp-name" placeholder="項目" class="w-full p-3 input-style text-sm">
                        <div class="grid grid-cols-2 gap-2">
                            <select id="exp-category" class="w-full p-3 input-style text-[11px]">
                                <option value="NEC">生活必要 (55%)</option>
                                <option value="FFA">財務自由 (20%)</option>
                                <option value="LTSS">長期儲蓄 (固定)</option>
                                <option value="INT">興趣開支 (15%)</option>
                                <option value="PLAY">享樂休閒 (10%)</option>
                            </select>
                            <select id="exp-account" class="w-full p-3 input-style text-[11px]"></select>
                        </div>
                        <input type="number" id="exp-amount" placeholder="金額" class="w-full p-3 input-style text-sm font-bold">
                        <button onclick="addRecord('expense')" class="w-full milktea-gradient text-white py-3 rounded-xl font-bold hover:brightness-105 transition">新增支出</button>
                    </div>

                    <div id="form-income" class="space-y-3 mb-6 hidden">
                        <input type="text" id="inc-name" placeholder="來源" class="w-full p-3 input-style text-sm">
                        <div class="grid grid-cols-2 gap-2">
                            <input type="number" id="inc-amount" placeholder="金額" class="w-full p-3 input-style text-sm font-bold">
                            <select id="inc-account" class="w-full p-3 input-style text-[11px]"></select>
                        </div>
                        <button onclick="addRecord('income')" class="w-full milktea-gradient-green text-white py-3 rounded-xl font-bold hover:brightness-105 transition">新增收入</button>
                    </div>

                    <div class="flex-grow overflow-y-auto max-h-[500px] space-y-2 pr-1" id="record-list"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: 新增帳戶 -->
    <div id="account-modal" class="fixed inset-0 modal-bg flex items-center justify-center p-4 z-50 hidden">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl">
            <h3 class="text-lg font-bold text-stone-700 mb-6">新增帳戶</h3>
            <div class="space-y-4">
                <input type="text" id="new-acc-name" placeholder="帳戶名稱" class="w-full p-3 input-style">
                <input type="number" id="new-acc-balance" placeholder="當前餘額" class="w-full p-3 input-style">
                <div class="flex gap-2 pt-4">
                    <button onclick="toggleModal('account-modal')" class="flex-1 py-3 text-stone-400 font-bold">取消</button>
                    <button onclick="addAccount()" class="flex-1 milktea-gradient text-white py-3 rounded-xl font-bold">確認</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'BUDGET_PLANNER_SHEETS_DATA';
        
        window.state = {
            records: [],
            accounts: [],
            salary: 40000,
            savingsGoal: 10000,
            scriptUrl: ''
        };

        // 讀取 LocalStorage (本地快取)
        function loadLocalData() {
            const savedData = localStorage.getItem(STORAGE_KEY);
            if (savedData) {
                try {
                    const parsed = JSON.parse(savedData);
                    window.state = { ...window.state, ...parsed };
                    document.getElementById('script-url').value = window.state.scriptUrl || '';
                } catch (e) { console.error(e); }
            }
            updateUI();
        }

        // 儲存至 LocalStorage
        function saveData() {
            window.state.scriptUrl = document.getElementById('script-url').value;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(window.state));
            updateUI();
        }

        // Google Sheets 同步邏輯 (透過 Apps Script)
        async function syncWithSheets() {
            const scriptUrl = document.getElementById('script-url').value.trim();
            if (!scriptUrl) {
                alert("請先貼上 Google Apps Script 的 Web App 網址");
                return;
            }

            const btn = document.getElementById('sync-btn');
            btn.innerText = "同步中...";
            btn.disabled = true;
            
            try {
                // 嘗試從雲端抓取最新資料 (doGet)
                const response = await fetch(scriptUrl);
                const cloudData = await response.json();
                
                if (cloudData && Array.isArray(cloudData)) {
                    // 簡單的合併邏輯：以雲端為主
                    window.state.records = cloudData;
                    alert("同步成功！已從雲端下載最新紀錄。");
                    saveData();
                }
            } catch (err) {
                console.error(err);
                alert("同步失敗，請檢查 Script URL 是否正確，且部署為「所有人」皆可存取。");
            } finally {
                btn.innerText = "同步雲端資料";
                btn.disabled = false;
            }
        }

        // 新增紀錄時同步寫入 (doPost)
        async function pushToSheets(record) {
            const scriptUrl = window.state.scriptUrl;
            if (!scriptUrl) return;

            try {
                await fetch(scriptUrl, {
                    method: 'POST',
                    mode: 'no-cors', // 因為跨網域限制，doPost 通常用 no-cors
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(record)
                });
                console.log("雲端同步成功");
            } catch (e) {
                console.error("雲端同步失敗", e);
            }
        }

        function toggleModal(id) {
            document.getElementById(id).classList.toggle('hidden');
        }

        function switchTab(tab) {
            document.getElementById('tab-expense').className = `flex-1 py-2 text-sm font-bold ${tab === 'expense' ? 'tab-active' : 'text-stone-400'}`;
            document.getElementById('tab-income').className = `flex-1 py-2 text-sm font-bold ${tab === 'income' ? 'tab-active' : 'text-stone-400'}`;
            document.getElementById('form-expense').classList.toggle('hidden', tab !== 'expense');
            document.getElementById('form-income').classList.toggle('hidden', tab !== 'income');
        }

        function updateSalaryGoal() {
            window.state.salary = parseFloat(document.getElementById('salary').value) || 0;
            window.state.savingsGoal = parseFloat(document.getElementById('savings-goal').value) || 0;
            saveData();
        }

        function addAccount() {
            const name = document.getElementById('new-acc-name').value.trim();
            const balance = parseFloat(document.getElementById('new-acc-balance').value) || 0;
            if (name) {
                window.state.accounts.push({ id: Date.now(), name, balance });
                document.getElementById('new-acc-name').value = '';
                document.getElementById('new-acc-balance').value = '';
                toggleModal('account-modal');
                saveData();
            }
        }

        function deleteAccount(id) {
            if (confirm('確定刪除帳戶？相關餘額調整將失效。')) {
                window.state.accounts = window.state.accounts.filter(a => a.id !== id);
                saveData();
            }
        }

        function addRecord(type) {
            const name = document.getElementById(type === 'expense' ? 'exp-name' : 'inc-name').value.trim();
            const amount = parseFloat(document.getElementById(type === 'expense' ? 'exp-amount' : 'inc-amount').value) || 0;
            const accId = parseInt(document.getElementById(type === 'expense' ? 'exp-account' : 'inc-account').value);

            if (amount <= 0 || isNaN(accId)) return;

            const accIdx = window.state.accounts.findIndex(a => a.id === accId);
            if (accIdx !== -1) {
                window.state.accounts[accIdx].balance += (type === 'income' ? amount : -amount);
            }

            const catMap = {NEC:'生活', FFA:'財務', LTSS:'儲蓄', INT:'興趣', PLAY:'享樂'};
            const cat = type === 'expense' ? document.getElementById('exp-category').value : 'INC';

            const newRecord = {
                id: Date.now(),
                type,
                name,
                amount,
                category: cat,
                categoryName: type === 'expense' ? catMap[cat] : '收入',
                accountName: window.state.accounts.find(a => a.id === accId).name,
                date: new Date().toLocaleDateString()
            };

            window.state.records.unshift(newRecord);
            pushToSheets(newRecord); // 同步到 Google Sheets

            document.getElementById(type === 'expense' ? 'exp-name' : 'inc-name').value = '';
            document.getElementById(type === 'expense' ? 'exp-amount' : 'inc-amount').value = '';
            saveData();
        }

        function deleteRecord(id) {
            const r = window.state.records.find(r => r.id === id);
            if(r) {
                const accIdx = window.state.accounts.findIndex(a => a.name === r.accountName);
                if(accIdx !== -1) {
                    window.state.accounts[accIdx].balance += (r.type === 'income' ? -r.amount : r.amount);
                }
                window.state.records = window.state.records.filter(r => r.id !== id);
                saveData();
            }
        }

        function updateUI() {
            document.getElementById('salary').value = window.state.salary;
            document.getElementById('savings-goal').value = window.state.savingsGoal;

            // 帳戶渲染
            const accCont = document.getElementById('accounts-container');
            accCont.innerHTML = (window.state.accounts || []).map(a => `
                <div class="bg-stone-50 p-4 rounded-xl border border-stone-100 relative group">
                    <button onclick="deleteAccount(${a.id})" class="absolute top-2 right-2 text-stone-200 opacity-0 group-hover:opacity-100 hover:text-red-400 transition">✕</button>
                    <div class="text-[9px] text-stone-400 font-bold uppercase mb-1">${a.name}</div>
                    <div class="font-bold text-stone-600">$${a.balance.toLocaleString()}</div>
                </div>
            `).join('');
            
            document.getElementById('total-assets').innerText = `$${(window.state.accounts || []).reduce((s, a) => s + a.balance, 0).toLocaleString()}`;

            const accOptions = (window.state.accounts || []).map(a => `<option value="${a.id}">${a.name}</option>`).join('');
            document.getElementById('exp-account').innerHTML = accOptions;
            document.getElementById('inc-account').innerHTML = accOptions;

            // 五罐子邏輯
            const totals = {
                NEC: (window.state.records || []).filter(r => r.type === 'expense' && r.category === 'NEC').reduce((s, r) => s + r.amount, 0),
                FFA: (window.state.records || []).filter(r => r.type === 'expense' && r.category === 'FFA').reduce((s, r) => s + r.amount, 0),
                LTSS: (window.state.records || []).filter(r => r.type === 'expense' && r.category === 'LTSS').reduce((s, r) => s + r.amount, 0),
                INT: (window.state.records || []).filter(r => r.type === 'expense' && r.category === 'INT').reduce((s, r) => s + r.amount, 0),
                PLAY: (window.state.records || []).filter(r => r.type === 'expense' && r.category === 'PLAY').reduce((s, r) => s + r.amount, 0)
            };

            const remainingForJar = window.state.salary - window.state.savingsGoal;
            const jarLogic = [
                { id: 'NEC', title: '生活必要 (55%)', type: 'perc', val: 0.55, spent: totals.NEC },
                { id: 'FFA', title: '財務自由 (20%)', type: 'perc', val: 0.20, spent: totals.FFA },
                { id: 'LTSS', title: '長期儲蓄 (固定)', type: 'fixed', val: window.state.savingsGoal, spent: totals.LTSS },
                { id: 'INT', title: '興趣開支 (15%)', type: 'perc', val: 0.15, spent: totals.INT },
                { id: 'PLAY', title: '享樂休閒 (10%)', type: 'perc', val: 0.10, spent: totals.PLAY }
            ];

            let consumableRemaining = 0;
            document.getElementById('jars-container').innerHTML = jarLogic.map(j => {
                const budget = j.type === 'perc' ? Math.max(0, Math.floor(remainingForJar * j.val)) : j.val;
                const remaining = budget - j.spent;
                if (j.id !== 'LTSS') consumableRemaining += remaining;
                return `
                    <div class="jar-card bg-white p-4 rounded-2xl">
                        <div class="text-[9px] font-bold text-stone-400 mb-1 uppercase tracking-wider">${j.title}</div>
                        <div class="text-lg font-black ${remaining < 0 ? 'text-red-400' : 'text-stone-700'}">$${remaining.toLocaleString()}</div>
                    </div>
                `;
            }).join('');

            document.getElementById('monthly-total').innerText = `$${consumableRemaining.toLocaleString()}`;
            renderRecords();
        }

        function renderRecords() {
            const list = document.getElementById('record-list');
            if (!window.state.records || window.state.records.length === 0) { list.innerHTML = `<div class="text-center py-20 text-stone-200 text-xs">尚無紀錄</div>`; return; }
            list.innerHTML = window.state.records.map(r => `
                <div class="flex justify-between items-center p-3 bg-stone-50 rounded-xl border border-stone-100 group">
                    <div class="flex flex-col">
                        <span class="text-xs font-bold text-stone-600">${r.name || '項目'} <span class="text-[8px] font-normal text-stone-300 ml-1">#${r.categoryName}</span></span>
                        <span class="text-[8px] text-stone-300">${r.date} · ${r.accountName}</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-xs font-bold ${r.type === 'income' ? 'text-green-600' : 'text-stone-500'}">${r.type === 'income' ? '+' : '-'}$${r.amount.toLocaleString()}</span>
                        <button onclick="deleteRecord(${r.id})" class="text-stone-200 opacity-0 group-hover:opacity-100 hover:text-red-400 transition">✕</button>
                    </div>
                </div>
            `).join('');
        }

        window.onload = loadLocalData;
    </script>
</body>
</html>
